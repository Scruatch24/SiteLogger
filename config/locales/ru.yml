    content_html: |
      <p>TalkInvoice использует Paddle для обработки платежей. Все возвраты обрабатываются Paddle.</p>
      <h2>Бесплатные аккаунты</h2>
      <p>Бесплатный тариф не требует оплаты. Возвраты не применяются.</p>
