  # Legal Pages
  terms_page:
    title: "Условия использования"
    updated: "Последнее обновление"
    content_html: |
      <h2>1. Принятие условий</h2>
      <p>Используя TalkInvoice («Сервис»), вы соглашаетесь с данными Условиями. Если не согласны, не используйте Сервис.</p>
      <h2>2. Описание сервиса</h2>
      <p>TalkInvoice — платформа для создания счетов голосом с помощью ИИ. Сервис предоставляется «как есть».</p>
      <h2>3. Аккаунты</h2>
      <p>Вы несёте ответственность за конфиденциальность учётных данных и все действия в аккаунте.</p>
      <h2>4. Допустимое использование</h2>
      <p>Запрещается злоупотребление Сервисом, включая несанкционированный доступ, вмешательство в работу других пользователей или использование в незаконных целях.</p>
      <h2>5. Интеллектуальная собственность</h2>
      <p>Сервис и его содержимое защищены международными законами об авторском праве.</p>
      <h2>6. Ограничение ответственности</h2>
      <p>TalkInvoice не несёт ответственности за косвенные, случайные или штрафные убытки.</p>
      <h2>7. Изменение условий</h2>
      <p>Мы оставляем за собой право изменять условия в любое время. Продолжение использования означает принятие новых условий.</p>

  privacy_page:
    title: "Политика конфиденциальности"
    updated: "Последнее обновление"
    content_html: |
      <h2>1. Собираемая информация</h2>
      <p>Мы собираем информацию, которую вы предоставляете: email, данные о компании и счетах, а также данные об использовании.</p>
      <h2>2. Использование информации</h2>
      <p>Мы используем вашу информацию для предоставления и улучшения Сервиса, обработки счетов и обеспечения безопасности.</p>
      <h2>3. Аудиоданные</h2>
      <p>Голосовые записи обрабатываются в реальном времени. Аудио не хранится постоянно на наших серверах после обработки.</p>
      <h2>4. Хранение данных</h2>
      <p>Данные аккаунта и счета хранятся безопасно с соответствующими техническими мерами защиты.</p>
      <h2>5. Сторонние сервисы</h2>
      <p>Мы используем сторонние сервисы (ИИ, аналитика, аутентификация), которые имеют собственные политики конфиденциальности.</p>
      <h2>6. Ваши права</h2>
      <p>Вы можете запросить доступ, исправление или удаление ваших данных в любое время.</p>
      <h2>7. Контакты</h2>
