# Additional translations at https://github.com/heartcombo/devise/wiki/I18n

en:
  devise:
    confirmations:
      confirmed: "Your email address has been successfully confirmed."
      send_instructions: "You will receive a confirmation email in a few minutes. Check your spam folder if you do not see it."
      send_paranoid_instructions: "If your email address exists in our database, you will receive a confirmation email in a few minutes. Check your spam folder if you do not see it."
    failure:
      already_authenticated: "You are already signed in."
      inactive: "Your account is not activated yet."
      invalid: "Invalid %{authentication_keys} or password."
      locked: "Your account is locked."
      last_attempt: "You have one more attempt before your account is locked."
      not_found_in_database: "Invalid %{authentication_keys} or password."
      timeout: "Your session expired. Please sign in again to continue."
      unauthenticated: "You need to sign in or sign up before continuing."
      unconfirmed: "You have to confirm your email address before continuing."
    mailer:
      confirmation_instructions:
        subject: "Verify Your Account [Ref: %{ref}]"
        header: "Verify Your Account"
        body: "Welcome to <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span>! You're one step away from finishing your account setup. Click the button below to verify <strong>%{email}</strong>."
        cta: "Confirm My Account"
        ignore: "If you didn't create an account, you can safely ignore this email."
        expire: "This link will expire soon for security."
      reset_password_instructions:
        subject: "Reset Password Request [Ref: %{ref}]"
        header: "Reset Password Request"
        body: "Hello! We received a request to reset the password for your <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span> account."
        cta: "Reset My Password"
        ignore: "If you didn't request this change, you can safely ignore this email."
        expire: "Your password will not change until you verify above."
      unlock_instructions:
        subject: "Unlock Instructions [Ref: %{ref}]"
        header: "Account Locked"
        body: "Your <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span> account has been locked due to an excessive number of unsuccessful sign in attempts."
        cta: "Unlock My Account"
        instruction: "Click the button below to unlock your account:"
      email_changed:
        subject: "Email Changed"
        header: "Email Security Alert"
        body: "Hello! We're contacting you to notify you that your <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span> account email has been changed to <strong>%{email}</strong>."
        body_unconfirmed: "Hello! We're contacting you to notify you that your <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span> account email is being changed to <strong>%{email}</strong>."
        unauthorized: "If you didn't authorize this change, please contact support or reset your password immediately."
      password_change:
        subject: "Password Changed"
        header: "Password Changed"
        body: "Hello! We're contacting you to notify you that your <span style='font-weight:900;color:#000000;'>Talk</span><span style='font-weight:900;color:#ea580c;'>Invoice</span> password has been changed."
        unauthorized: "If you didn't authorize this change, please contact support immediately."
    omniauth_callbacks:
      failure: "Could not authenticate you from %{kind} because \"%{reason}\"."
      success: "Successfully authenticated from %{kind} account."
    passwords:
      no_token: "You can't access this page without coming from a password reset email. If you do come from a password reset email, please make sure you used the full URL provided."
      send_instructions: "You will receive a password reset email in a few minutes. Check your spam folder if you do not see it."
      send_paranoid_instructions: "If your email address exists in our database, you will receive a password reset email in a few minutes. Check your spam folder if you do not see it."
      updated: "Your password has been changed successfully. You are now signed in."
      updated_not_active: "Your password has been changed successfully."
    registrations:
      destroyed: "Bye! Your account has been successfully cancelled. We hope to see you again soon."
      signed_up: "Welcome! You have signed up successfully."
      signed_up_but_inactive: "You have signed up successfully. However, we could not sign you in because your account is not yet activated."
      signed_up_but_locked: "You have signed up successfully. However, we could not sign you in because your account is locked."
      signed_up_but_unconfirmed: "A confirmation link has been sent to your email address. Open it to activate your account, and check your spam folder if needed."
      update_needs_confirmation: "You updated your account successfully, but we need to verify your new email address. Please check your email and follow the confirmation link to confirm your new email address."
      updated: "Your account has been updated successfully."
      updated_but_not_signed_in: "Your account has been updated successfully, but since your password was changed, you need to sign in again."
    sessions:
      signed_in: "Signed in successfully."
      signed_out: "Signed out successfully."
      already_signed_out: "Signed out successfully."
      signed_out_other_device: "You were signed out because your account was signed in from another device."
    unlocks:
      send_instructions: "You will receive an account unlock email in a few minutes. Check your spam folder if you do not see it."
      send_paranoid_instructions: "If your account exists, you will receive an account unlock email in a few minutes. Check your spam folder if you do not see it."
      unlocked: "Your account has been unlocked successfully. Please sign in to continue."
  errors:
    messages:
      already_confirmed: "was already confirmed, please try signing in"
      confirmation_period_expired: "needs to be confirmed within %{period}, please request a new one"
      expired: "has expired, please request a new one"
      not_found: "not found"
      not_locked: "was not locked"
      not_saved:
        one: "1 error prohibited this %{resource} from being saved:"
        other: "%{count} errors prohibited this %{resource} from being saved:"
